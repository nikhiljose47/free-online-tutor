<div class="main container py-4">
  <h4 class="fw-bold mb-4 text-center">Meet Our Teachers</h4>

  <div class="row g-4">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3" *ngFor="let t of teachers()">
      <div class="teacher-card">
        <!-- IMAGE (80%) -->
        <div class="teacher-image">
          <img
            class="banner"
            [src]="getBannerSrc(t.photoUrl)"
            [alt]="getBannerAlt(t.name)"
            loading="lazy"
            (error)="onImgError($event)"
          />
        </div>

        <!-- DETAILS (20%) -->
        <div class="teacher-info">
          <div class="name">
            {{ t.name }}
          </div>

          <div class="qualification">
            {{ t.bio }}
          </div>

          <div class="domains">
            <span *ngFor="let d of t.subjects" class="domain-chip">
              {{ d }}
            </span>
          </div>

          <div class="note">
            {{ t.bio }}
          </div>

          <div class="contact">
            {{ t.phone }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
