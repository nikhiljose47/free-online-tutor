<div class="main container py-4">
  <h4 class="fw-semibold text-center mb-4">Meet Our Teachers</h4>

  <div class="teacher-list">
    <div class="teacher-card mb-4" *ngFor="let t of teachers()">
      <div class="teacher-layout">
        <!-- LEFT IMAGE PANEL (30%) -->

        <div class="teacher-image">
          <img
            [src]="getBannerSrc(t.photoUrl)"
            [alt]="getBannerAlt(t.name)"
            loading="lazy"
            (error)="onImgError($event)"
          />
        </div>

        <!-- RIGHT DETAILS PANEL (70%) -->

        <div class="teacher-content">
          <!-- HEADER -->

          <div class="teacher-header">
            <div class="teacher-name">
              {{ t.name }}
            </div>

            <div class="teacher-rating">⭐ {{ t.rating }}</div>
          </div>

          <!-- BIO -->

          <div class="teacher-bio">
            {{ t.bio }}
          </div>

          <!-- SUBJECTS -->

          <div class="teacher-subjects">
            <span class="subject-chip" *ngFor="let s of t.subjects">
              {{ s }}
            </span>
          </div>

          <!-- DETAILS GRID -->

          <div class="teacher-meta">
            <div class="meta-item"><strong>ID:</strong> {{ t.uid }}</div>

            <div class="meta-item" *ngIf="t.age"><strong>Age:</strong> {{ t.age }}</div>

            <div class="meta-item" *ngIf="t.expYrs">
              <strong>Experience:</strong> {{ t.expYrs }} yrs
            </div>

            <div class="meta-item" *ngIf="t.email"><strong>Email:</strong> {{ t.email }}</div>

            <div class="meta-item" *ngIf="t.phone"><strong>Phone:</strong> {{ t.phone }}</div>
          </div>

          <!-- SPECIALIZATION -->

          <div class="teacher-specialization">
            <span *ngFor="let sp of t.specialization">
              {{ sp }}
            </span>
          </div>

          <!-- TRUST NOTE -->

          <div class="teacher-trust">Trusted educator helping students succeed.</div>
        </div>
      </div>
    </div>
  </div>
</div>
