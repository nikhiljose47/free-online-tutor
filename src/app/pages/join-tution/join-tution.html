<dot-loader *ngIf="isLoading(); else hasError"></dot-loader>

<ng-template #hasError>
  <content-placeholder *ngIf="hasErr(); else hasData" [message]="errMsg()"></content-placeholder>
</ng-template>

<ng-template #hasData>
  <section class="class-layout">
    <!-- LEFT : Cover (UNCHANGED) -->
    <aside *ngIf="hasCoverImgErr(); else coverImgErr" class="class-cover">
      <img
        class="cover-img"
        [src]="getBannerSrc(banner)"
        [alt]="getBannerAlt(banner)"
        loading="lazy"
        (error)="onImgError($event)"
      />
    </aside>

    <ng-template #coverImgErr>
    <div class="p-5 h-100">
  <cover-placeholder message="Sample Cover"></cover-placeholder>
</div>
    </ng-template>

    <!-- RIGHT : Refined Editorial Layout -->
    <main class="class-details">
      <!-- TOP ACTION STRIP -->

      <!-- TITLE + META -->
      <section class="title-block">
        <h1 class="title">{{ title }}</h1>
      </section>

      <section class="details-row">
        <!-- LEFT COLUMN (unchanged block inside) -->
        <div class="left-col">
          <section class="title-block">
            <p class="teacher">By {{ teacher }}</p>
            <span class="duration">{{ duration }}</span>
          </section>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-col">
          <header class="details-header">
            <button class="share-btn" (click)="shareClass()">
              <i class="bi bi-share"></i> Share
            </button>

            <button
              class="cta-btn d-none d-md-inline-flex"
              (click)="onClickInterestBtn()"
              [disabled]="hasmarkedInterest()"
            >
              {{
                hasmarkedInterest() ? 'Interested' : !isUpcoming() ? 'Join Class' : 'I will attend'
              }}
            </button>
          </header>
        </div>
      </section>
      <!-- DESCRIPTION -->
      <section class="details-block mt-5">
        <h3 class="section-title">About this class</h3>
        <p class="desc">{{ description }}</p>
      </section>

      <!-- STATS PANEL -->
      <section class="stats-box">
        <div class="stat">
          <span class="value">{{ students }}+</span>
          <span class="label">Students interested</span>
        </div>

        <div class="stat">
          <span class="value">{{ rating }}</span>
          <span class="label">Rating</span>
        </div>

        <div class="stat">
          <span class="value">NCERT + ICSE</span>
          <span class="label">Curriculum</span>
        </div>
      </section>
    </main>
  </section>

  <!-- MOBILE CTA (UNCHANGED LOGIC) -->
  <div class="mobile-join d-md-none">
    <button class="cta-btn w-100" (click)="onClickInterestBtn()" [disabled]="hasmarkedInterest()">
      {{ !isUpcoming() ? 'Join Class' : 'I will attend' }}
    </button>
  </div>
</ng-template>
