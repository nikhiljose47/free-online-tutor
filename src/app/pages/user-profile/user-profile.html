<section class="hub">
  <!-- TOP STRIP -->
  <header class="hub-top container-fluid">
    <div class="hub-left">
      <div class="hub-title">Student Hub</div>
      <div class="hub-sub">Profile · Performance · Activity</div>
    </div>

    <div class="hub-actions">
      <button class="btn btn-outline-dark btn-sm" (click)="toggleEdit()">
        {{ isEdit() ? 'Cancel' : 'Edit' }}
      </button>
      <button *ngIf="isEdit()" class="btn btn-dark btn-sm" (click)="saveProfile()">
        Save
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div class="hub-body container-fluid">
    <!-- SIDEBAR -->
    <aside class="hub-sidebar">
      <nav class="hub-nav">
        <button [class.active]="activeTab() === 'overview'" (click)="setTab('overview')">
          <i class="bi bi-grid"></i>
          <span>Overview</span>
        </button>

        <button [class.active]="activeTab() === 'profile'" (click)="setTab('profile')">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </button>

        <button [class.active]="activeTab() === 'photo'" (click)="setTab('photo')">
          <i class="bi bi-image"></i>
          <span>Avatar</span>
        </button>

        <button [class.active]="activeTab() === 'bookings'" (click)="setTab('bookings')">
          <i class="bi bi-calendar"></i>
          <span>Sessions</span>
        </button>

        <button [class.active]="activeTab() === 'points'" (click)="setTab('points')">
          <i class="bi bi-star"></i>
          <span>Points</span>
        </button>

        <button [class.active]="activeTab() === 'security'" (click)="setTab('security')">
          <i class="bi bi-shield-lock"></i>
          <span>Security</span>
        </button>
      </nav>
    </aside>

    <!-- RIGHT CONTENT -->
    <user-profile-content
      [activeTab]="activeTab"
      [isEdit]="isEdit"
      [profile]="profile"
      [bookings]="bookings"
      [selectedAvatar]="selectedAvatar"
      [pointsList]="pointsList"
      [totalPoints]="totalPoints"
      [popularity]="popularity"
      [editable]="editable"
    />
  </div>
</section>
