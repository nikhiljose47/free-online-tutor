<section class="class-details-page d-flex flex-column gap-3 mx-0 my-3 mx-md-5">
  <!-- HEADER (NOT STICKY) -->
  <header class="class-header">
    <h1 class="m-0 fw-semibold text-truncate p-3">
      {{ classTitle }}
    </h1>
  </header>

  <nav class="right-sticky-nav">
    <ul class="nav-list">
      <li
        class="nav-item"
        [class.active]="activeMainTab() === 'overview'"
        (click)="select('overview')"
      >
        Overview
      </li>

      <li class="nav-item" [class.active]="activeMainTab() === 'games'" (click)="select('games')">
        Games
      </li>

      <li class="nav-item" [class.active]="activeMainTab() === 'stats'" (click)="select('stats')">
        Schedule
      </li>
    </ul>
  </nav>

  <section class="tab-content">
    @switch (activeMainTab()) {
      @case ('overview') {
        <class-overview [classId]="classId"></class-overview>
      }
      @case ('games') {
        <mcq-puzzle-card
          [puzzleId]="puzzleId"
          (completedChange)="onPuzzleCompleted($event)"
          class="flex-shrink-0"
        ></mcq-puzzle-card>
      }
      @case ('stats') {
        <timetable [classFileId]="classFileId"></timetable>
      }
    }
  </section>
  <!-- 🎮 HORIZONTAL GAME STRIP -->
  <section class="horizontal-strip">
    <div class="d-flex gap-3 overflow-auto no-scrollbar">
      <!-- ORIGINAL SUBJECT CARD LOOP (KEPT) -->
      <!--
      <app-subject-card
        *ngFor="let item of subjects"
        class="flex-shrink-0">
      </app-subject-card>
      -->

      <!-- CURRENT PUZZLE CARD -->
    </div>
  </section>

  <section>
    <class-schedule-list [classId]="classId"></class-schedule-list>
  </section>

  <!-- ⚡ EXTRA SECTION -->
  <section class="extra-section mt-5">
    <h2 class="d-flex justify-content-center mb-4 my-5">Know Us..</h2>
  </section>

  <section class="my-5">
    <explore-courses-banner></explore-courses-banner>
  </section>

  <section>
    <h2 class="d-flex justify-content-center mb-4 my-5">The Teachers</h2>
    <user-card-list [classId]="classId"></user-card-list>
  </section>

  <section class="class-stats-banner my-5">
    <div class="banner-fade banner-fade-left"></div>
    <div class="banner-fade banner-fade-right"></div>

    <div class="banner-inner">
      <!-- Top row: image + title -->
      <div class="banner-head container-fluid">
        <div class="head-wrap">
          <img class="banner-img" src="assets/up-wooden-bg.webp" alt="Class overview" />

          <h2 class="banner-title">Trusted learning journey across India</h2>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-row container-fluid">
        <div class="stat" *ngFor="let s of stats()">
          <h3>{{ s.value }}</h3>
          <p>{{ s.label }}</p>
        </div>
      </div>
    </div>
  </section>

  <section class="container py-4">
    <faq-list></faq-list>
  </section>

  <footer *ngIf="quote().text !== ''" class="quote-section">
    <p class="quote-text">
      “{{ quote().text }}”,<span> {{ quote().author ?? '' }}</span>
    </p>
  </footer>
</section>
