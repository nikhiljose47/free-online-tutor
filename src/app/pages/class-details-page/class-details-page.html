<section class="class-details-page d-flex flex-column gap-3">
  <!-- HEADER (NOT STICKY) -->
  <header class="class-header p-3 shadow-sm">
    <h1 class="m-0 fw-semibold text-truncate">
      {{ classTitle }}
    </h1>
  </header>

  <!-- 🔥 STICKY GAME TAB BAR ONLY -->
  <nav class="class-tabs sticky-game-tabs">
    <div class="tab-shell d-flex justify-content-end">
      <ul class="nav nav-pills gap-2 flex-nowrap overflow-auto no-scrollbar tab-inner">
        <li class="nav-item" *ngFor="let t of tabs">
          <button
            class="nav-link game-tab"
            [class.active]="t === activeTab()"
            (click)="selectTab(t)"
          >
            <span class="tab-label">{{ t }}</span>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- 🎮 HORIZONTAL GAME STRIP -->
  <section class="horizontal-strip">
    <div class="d-flex gap-3 overflow-auto no-scrollbar">
      <!-- ORIGINAL SUBJECT CARD LOOP (KEPT) -->
      <!--
      <app-subject-card
        *ngFor="let item of subjects"
        class="flex-shrink-0">
      </app-subject-card>
      -->

      <!-- CURRENT PUZZLE CARD -->
      <mcq-puzzle-card
        [puzzleId]="puzzleId"
        (completedChange)="onPuzzleCompleted($event)"
        class="flex-shrink-0"
      ></mcq-puzzle-card>
    </div>
  </section>

  <!-- 📊 MAIN DETAIL -->
  <section class="detail-section">
    <timetable classFileId="CL09" *ngIf="activeTab() === 'Overview'"></timetable>
    <timetable classFileId="CL09" *ngIf="activeTab() === 'Timetable'"></timetable>
    <timetable classFileId="CL09" *ngIf="activeTab() === 'Tests'"></timetable>
    <timetable classFileId="CL09" *ngIf="activeTab() === 'Announcements'"></timetable>

    <!--
    <app-class-overview *ngIf="activeTab === 'Overview'"></app-class-overview>
    <app-class-assignments *ngIf="activeTab === 'Assignments'"></app-class-assignments>
    <app-class-tests *ngIf="activeTab === 'Tests'"></app-class-tests>
    <app-class-announcements *ngIf="activeTab === 'Announcements'"></app-class-announcements>
    -->
  </section>

  <!-- ⚡ EXTRA SECTION -->
  <section class="extra-section">
    <!-- <app-class-activity></app-class-activity> -->
  </section>

  <section>
    <h2>Teachers :</h2>
    <teacher-list [classId]="classId"></teacher-list>
  </section>
</section>
