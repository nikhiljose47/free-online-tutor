<div class="container py-4">
  <!-- Header -->
  <div class="d-flex align-items-center mb-3">
    <h4 class="fw-bold mb-0 flex-grow-1">{{ profile()?.name }}’s Classes</h4>
  </div>

  <!-- Horizontal Rail (always visible) -->
  <div class="meetings-rail-wrapper mb-4">
    <!-- Right Arrow (only if meetings exist) -->
    <button
      *ngIf="meetings().length"
      class="rail-arrow"
      type="button"
      (click)="rail.scrollBy({ left: 260, behavior: 'smooth' })"
    >
      →
    </button>

    <!-- Scrollable strip -->
    <div #rail class="meetings-strip">
      <!-- ✅ SCHEDULE CARD (always visible) -->
      <div
        class="meeting-card schedule-card"
        (click)="startCreate()"
        [class.active]="mode() === 'create'"
      >
        <div class="schedule-plus">＋</div>
        <div class="schedule-text">Schedule<br />Class</div>
      </div>

      <!-- EXISTING MEETINGS (only if any) -->
      <div
        class="meeting-card"
        *ngFor="let m of meetings(); trackBy: trackByMeetingId"
        [class.live]="m.status === 'LIVE'"
        [class.active]="mode() === 'view' && selectedMeeting()?.id === m.id"
        (click)="selectMeeting(m)"
      >
        <!-- TOP -->
        <div class="card-top">
          <div class="class-id">Class {{ m.classId }}</div>
          <div class="subject">{{ m.subjectId }}</div>
        </div>

        <!-- BOTTOM -->
        <div class="card-bottom">
          <span class="time">
            {{ m.date.toDate() | date: 'hh:mm a, MMM d' }}
          </span>

          <span *ngIf="m.status === 'LIVE'" class="live-pill"> LIVE </span>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW MODE -->
  <div *ngIf="mode() === 'view' && selectedMeeting()" class="details-card mx-auto">
    <class-wrapup [meetId]="selectedMeeting()?.id ?? ''"></class-wrapup>
  </div>

  <schedule-live-class-form></schedule-live-class-form>

  <!-- CREATE MODE -->
  <!-- CREATE MODE -->
  <div *ngIf="mode() === 'create'" class="schedule-card card shadow-sm mx-auto">
    <div class="card-body">
      <!-- TITLE -->
      <h5 class="fw-bold mb-4">Setup..</h5>

      <!-- ================= ACADEMIC SECTION ================= -->
      <div class="mb-4">
        <h6 class="section-title">Academic Details</h6>

        <div class="row g-3">
          <!-- CLASS -->
          <div class="col-md-4">
            <select class="form-select" #classSel (change)="updateField('classId', classSel.value)">
              <option value="">Class</option>
              <option *ngFor="let c of classList()" [value]="c">{{ c }}</option>
            </select>
          </div>

          <!-- SUBJECT -->
          <div class="col-md-4">
            <select
              class="form-select"
              #subjectSel
              (change)="updateField('subjectId', subjectSel.value)"
            >
              <option value="">Subject</option>
              <option *ngFor="let s of subjectList()" [value]="s">{{ s }}</option>
            </select>
          </div>

          <!-- CHAPTER -->
          <div class="col-md-4">
            <select
              class="form-select"
              #chapterSel
              (change)="updateField('chapterCode', chapterSel.value)"
            >
              <option value="">Chapter</option>
              <option *ngFor="let ch of chapterList()" [value]="ch.code">
                {{ ch.code }} — {{ ch.name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- ================= SESSION SECTION ================= -->
      <div class="mb-4">
        <h6 class="section-title">Session Details</h6>

        <div class="row g-3">
          <!-- BATCH DROPDOWN -->
          <div class="col-md-4">
            <select class="form-select" #batchSel (change)="updateField('batchId', batchSel.value)">
              <option value="">Batch</option>
              <option *ngFor="let b of batchList()" [value]="b">{{ b }}</option>
            </select>
          </div>

          <!-- MEETING LINK WITH VALIDATION -->
          <div class="col-md-8">
            <input
              type="url"
              class="form-control"
              placeholder="Meeting link (https://...)"
              #meetInput
              (input)="updateField('meetLink', meetInput.value)"
              [class.is-invalid]="meetInput.value && !isValidUrl(meetInput.value)"
            />
            <div class="invalid-feedback">Enter a valid meeting URL.</div>
          </div>

          <!-- SIMPLE DATE PICKER -->
          <div class="col-md-6">
            <input
              type="date"
              class="form-control"
              #dateInput
              (change)="updateField('date', dateInput.value)"
            />
          </div>

          <!-- TIME PICKER -->
          <div class="col-md-6">
            <input
              type="time"
              class="form-control"
              #timeInput
              (change)="updateField('time', timeInput.value)"
            />
          </div>
        </div>
      </div>

      <!-- ================= ACTION ================= -->
      <div class="text-end">
        <button
          class="btn btn-primary px-4"
          [disabled]="submitting()"
          (click)="scheduleClass()"
        >
          Schedule Class
        </button>
      </div>
    </div>
  </div>
</div>
