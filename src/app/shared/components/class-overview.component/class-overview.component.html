  <!-- BATCH SELECTOR -->
  <section class="batch-strip container">
    <div class="batch-list">
      <button
        type="button"
        class="batch-card"
        *ngFor="let b of batches(); let i = index"
        [class.active]="i === selectedBatchIndex()"
        (click)="selectBatch(i)"
      >
        <div class="batch-name">{{ b.name }}</div>

        <div class="batch-meta">
          <span>{{ b.time }}</span>
          <span
            class="status"
            [class.upcoming]="b.status === 'upcoming'"
            [class.live]="b.status === 'live'"
          >
            {{ b.status }}
          </span>
        </div>
      </button>
    </div>
  </section>

  <!-- DETAILS -->
  <section class="overview-body container" *ngIf="selectedBatch() as data">
    <div class="overview-top">
      <div class="enroll" [class.open]="data.enrollmentOpen">
        {{ data.enrollmentOpen ? 'Enrollment Open' : 'Enrollment Closed' }}
      </div>

      <div class="stats">
        <div class="stat">
          <h3>{{ data.totalStudents }}</h3>
          <p>Students</p>
        </div>

        <div class="stat">
          <h3>{{ data.totalBatches }}</h3>
          <p>Batches</p>
        </div>

        <div class="stat">
          <h3>{{ data.upcomingClass }}</h3>
          <p>Next Class</p>
        </div>
      </div>
    </div>

    <!-- SUBJECT PROGRESS -->
    <section class="subjects">
      <div class="subject" *ngFor="let s of data.subjects">
        <div class="subject-head">
          <h4>{{ s.name }}</h4>
          <span class="progress-text"> {{ s.currentIndex + 1 }} / {{ s.chapters.length }} </span>
        </div>

        <!-- Creative linear roadmap -->
        <div class="progress-bar">
          <div
            class="progress-fill"
            [style.width.%]="((s.currentIndex + 1) * 100) / s.chapters.length"
          ></div>
        </div>

        <div class="chapter-row">
          <span
            class="chapter"
            *ngFor="let c of s.chapters; let i = index"
            [class.current]="i === s.currentIndex"
          >
            {{ c }}
          </span>
        </div>
      </div>
    </section>
  </section>
</section>
