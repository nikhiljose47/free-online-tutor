<section class="lx-shell">
  <main class="lx-main">
    <section class="lx-flow">
      <flow-orchestrator />
    </section>

    <section class="lx-overview">
      <section class="lx-batch" *ngIf="dashboard() as db">
        <div class="lx-batch-track">
          <button
            type="button"
            class="lx-batch-card live"
            *ngFor="let b of db.live; trackBy: trackBatch"
            [class.active]="selectedBatchId() === b.id"
            (click)="onSelectBatch(b)"
          >
            <div class="lx-batch-name">{{ b.label }}</div>
            <div class="lx-batch-meta">
              <span>{{ b.startAt.toDate() | date: 'hh:mm a' }}</span>
              <span class="lx-tag live">Live</span>
            </div>
          </button>

          <button
            type="button"
            class="lx-batch-card upcoming"
            *ngFor="let b of db.upcoming; trackBy: trackBatch"
            [class.active]="selectedBatchId() === b.id"
            (click)="onSelectBatch(b)"
          >
            <div class="lx-batch-name">{{ b.label }}</div>
            <div class="lx-batch-meta">
              <span>{{ b.startAt.toDate() | date: 'hh:mm a' }}</span>
              <span class="lx-tag upcoming">Upcoming</span>
            </div>
          </button>
        </div>
      </section>

      <section class="lx-body" *ngIf="selectedBatch() as data">
        <div class="lx-top">
          <div class="lx-enroll" [class.open]="data.isEnrollmentOpen">
            {{ data.isEnrollmentOpen ? 'Enrollment Open' : 'Closed' }}
          </div>

          <div class="lx-stats">
            <div class="lx-stat">
              <h3>{{ data.enrolledCount }}</h3>
              <p>Students</p>
            </div>

            <div class="lx-stat">
              <h3>{{ dashboard()?.total }}</h3>
              <p>Batches</p>
            </div>

            <div class="lx-stat">
              <h3>{{ dashboard()?.upcomingCount }}</h3>
              <p>Upcoming</p>
            </div>
          </div>
        </div>

        <section class="lx-subjects">
          <div class="lx-subject" *ngFor="let s of mergedSubjectProgress(); trackBy: trackSubject">
            <div class="lx-subject-head">
              <h4>{{ s.subjectName }}</h4>

              <div class="lx-meta">
                <span class="lx-chip neutral" *ngIf="s.status === 'not-started'">
                  Not Started
                </span>

                <span class="lx-chip active" *ngIf="s.status === 'in-progress'">
                  {{ s.currentChapterName }}
                </span>

                <span class="lx-progress"> {{ s.total ? s.currentIndex : 0 }}/{{ s.total }} </span>
              </div>
            </div>

            <div class="lx-progress-bar">
              <div class="lx-progress-fill" [style.width.%]="s.percent"></div>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <aside class="lx-sidebar d-none d-lg-block">
    <div class="lx-sidebar-inner">
      <course-sidebar
        *ngIf="viewState.subjects().length"
        [subjects]="viewState.subjects"
        [chapters]="viewState.chapters"
        [selectedSubject]="viewState.selectedSubject"
        [selectedChapter]="viewState.selectedChapter"
      />
    </div>
  </aside>
</section>
