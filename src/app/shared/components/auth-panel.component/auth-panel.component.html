<section class="auth-shell">
  <div class="auth-card">
    <!-- MODE SWITCH -->
    <div class="auth-mode">
      <button class="mode-btn" [class.active]="mode() === 'login'" (click)="mode.set('login')">
        Login
      </button>

      <button class="mode-btn" [class.active]="mode() === 'signup'" (click)="mode.set('signup')">
        Sign Up
      </button>
    </div>

    <!-- LOGIN FORM -->
    <form
      class="auth-form"
      *ngIf="mode() === 'login'"
      (submit)="onLoginSubmit(); $event.preventDefault()"
    >
      <h3 class="auth-title">Welcome back</h3>

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          placeholder="Enter your name"
          [value]="name()"
          (input)="onInput($event)"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter password"
          [value]="pswd()"
          (input)="onInputP($event)"
        />
      </div>

      <button class="primary-btn" [class.loading]="loading()">
        {{ loading() ? 'Please wait...' : 'Login' }}
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form
      class="auth-form"
      *ngIf="mode() === 'signup'"
      (submit)="onRegisterSubmit(); $event.preventDefault()"
    >
      <h3 class="auth-title">Create your account</h3>

      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your name" [value]="name()" (input)="onInput($event)" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="Enter email"
          [value]="email()"
          (input)="onInputEmail($event)"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Create password"
          [value]="password()"
          (input)="onInputPassword($event)"
        />
      </div>

      <!-- ✅ CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Confirm Password</label>
        <input
          type="password"
          placeholder="Re-enter password"
          [value]="confirmPassword()"
          (input)="onInputConfirmPassword($event)"
        />
      </div>

      <!-- mismatch hint -->
      <div
        class="error-text"
        *ngIf="password() && confirmPassword() && password() !== confirmPassword()"
      >
        Passwords do not match
      </div>

      <button class="primary-btn" [class.loading]="loading()">
        {{ loading() ? 'Creating...' : 'Create Account' }}
      </button>
    </form>
  </div>
</section>
