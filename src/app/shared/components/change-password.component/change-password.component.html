<div class="card border-0 shadow-sm p-4">

  <!-- HEADER -->
  <div class="mb-4">
    <h4 class="fw-semibold mb-1">Change Password</h4>
    <div class="text-muted small">Update your account password securely</div>
  </div>

  <!-- FORM -->
  <div class="row g-3">

    <!-- CURRENT PASSWORD -->
    <div class="col-12">
      <label class="form-label small">Current Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="form.currentPassword"
        placeholder="Enter current password"
      />
    </div>

    <!-- NEW PASSWORD -->
    <div class="col-md-6">
      <label class="form-label small">New Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="form.newPassword"
        placeholder="Enter new password"
      />
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="col-md-6">
      <label class="form-label small">Confirm Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="form.confirmPassword"
        placeholder="Re-enter new password"
      />
    </div>

    <!-- VALIDATION -->
    <div class="col-12">
      <div *ngIf="form.newPassword && form.confirmPassword && form.newPassword !== form.confirmPassword"
           class="text-danger small">
        Passwords do not match
      </div>
    </div>

  </div>

  <!-- ACTION -->
  <div class="mt-4 d-flex justify-content-end">
    <button
      class="btn btn-dark btn-sm"
      [disabled]="!form.currentPassword || !form.newPassword || form.newPassword !== form.confirmPassword"
      (click)="changePassword()"
    >
      Update Password
    </button>
  </div>

</div>
