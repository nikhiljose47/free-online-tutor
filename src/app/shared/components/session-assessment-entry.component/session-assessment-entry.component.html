<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 rounded-3">
      <div class="modal-header">
        <h6 class="modal-title fw-semibold">Bulk Session Import</h6>
        <button class="btn-close" (click)="close()"></button>
      </div>

      <div class="modal-body">
        <div class="small text-muted mb-2">Paste rows copied from Excel</div>

        <textarea
          class="form-control"
          rows="11"
          placeholder="Student id	Assignment marks	Max marks	Participation rating	Remarks

d1	2	10	2	das
d2	2	10	10	dasd
d3	2	10	2	das"
          style="font-family: monospace; white-space: pre"
          (paste)="handlePaste($event)"
        ></textarea>

        <div *ngIf="errors()?.length" class="mt-3">
          <div class="small text-danger fw-semibold mb-2">Import Errors</div>

          <div class="border rounded-3 p-2 bg-light">
            <div *ngFor="let err of errors()" class="small text-danger mb-1">
              • Row {{ err.row }} — {{ err.message }}
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary btn-sm" (click)="close()">Cancel</button>

        <button class="btn btn-dark btn-sm" (click)="import()">Import</button>
      </div>
    </div>
  </div>
</div>
