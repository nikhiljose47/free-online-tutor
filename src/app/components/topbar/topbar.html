<header class="topbar">
  <nav class="topbar-inner" aria-label="Main navigation">
    <!-- BRAND -->
    <a class="brand-area" routerLink="/" aria-label="Scholo Learning Home">
      <img src="favicon.ico" class="app-logo" alt="Scholo Learning" />
      <span class="brand-text d-none d-sm-inline">Scholo</span>
    </a>

    <!-- SEARCH (desktop only) -->
    <div class="search-area d-none d-lg-flex" (click)="$event.stopPropagation()">
      <input
        #myInput
        type="text"
        class="search-input"
        placeholder="Search..."
        (focus)="ss.open.set(true)"
        (input)="onSearchInput($any($event.target).value)"
      />

      <button class="search-btn" type="button" (click)="ss.open.set(true)">
        <i class="bi bi-search"></i>
      </button>

      <ul *ngIf="ss.open() && ss.results().length" class="search-results">
        <li *ngFor="let item of ss.results()" (mousedown)="ss.navigate(item.route)">
          {{ item.label }}
        </li>
      </ul>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <!-- MOBILE SEARCH ICON -->
      <button class="topbar-link d-lg-none" (click)="ss.open.set(true)">
        <i class="bi bi-search"></i>
      </button>

      <!-- STUDENT -->
      <ng-container *ngIf="profile()?.role === 'student'">
        <div class="learn-dropdown" (click)="$event.stopPropagation()">
          <span class="topbar-link" [class.active]="learnOpen()" (click)="toggleLearn()">
            Learn <i class="bi bi-caret-down-fill small"></i>
          </span>

          <div class="learn-menu" *ngIf="learnOpen()">
            <a routerLink="/report-card" class="menu-item" (click)="closeLearn()">Report</a>
            <a routerLink="/student-creations" class="menu-item" (click)="closeLearn()"
              >Creations</a
            >
          </div>
        </div>
      </ng-container>

      <!-- TEACHER -->
      <ng-container *ngIf="profile()?.role === 'teacher'">
        <div class="learn-dropdown" (click)="$event.stopPropagation()">
          <span class="topbar-link" [class.active]="proffOpen()" (click)="toggleProff()">
            Studio <i class="bi bi-caret-down-fill small"></i>
          </span>

          <div class="learn-menu" *ngIf="proffOpen()">
            <a routerLink="/schedule" class="menu-item">Schedule</a>
            <a routerLink="/chapter-browser" class="menu-item">Browse</a>
            <a routerLink="/teacher-workspace" class="menu-item">Dashboard</a>
          </div>
        </div>
      </ng-container>

      <!-- JOIN -->
      <div class="learn-dropdown d-none d-md-flex" (click)="$event.stopPropagation()">
        <span class="topbar-link" [class.active]="otherOpen()" (click)="toggleOther()">
          Explore <i class="bi bi-caret-down-fill small"></i>
        </span>

        <div class="learn-menu" *ngIf="otherOpen()">
          <a routerLink="/about" class="menu-item" (click)="closeOther()">About</a>
          <a routerLink="/tuition-centers" class="menu-item" (click)="closeOther()">Centers</a>
          <a routerLink="/career" class="menu-item" (click)="closeOther()">Teach</a>
        </div>
      </div>

      <!-- TEACHERS -->
      <a class="topbar-link d-none d-md-inline" routerLink="/teachers">Mentors</a>

      <!-- AUTH -->
      <ng-container *ngIf="!profile()">
        <a class="topbar-link" routerLink="/login">Login</a>
      </ng-container>

      <!-- PROFILE + POINTS -->
      <div class="profile-wrap" *ngIf="profile()">
        <!-- POINTS -->
        <div class="points-badge-wrap">
          <div class="points-badge">
            <i class="bi bi-lightning-fill"></i>
            <span>{{ profile()?.points?.points || 0 }}</span>
          </div>

          <!-- HINT -->
          <div class="points-hint">Total points ⭐</div>
        </div>

        <!-- AVATAR -->
        <img
          [src]="CommonUtil.getAvatarUrl(profile()?.avatarId || null)"
          class="profile-icon"
          (click)="toggleMenu(); $event.stopPropagation()"
        />

        <!-- MENU -->
        <div class="learn-menu" *ngIf="menuOpen()">
          <a routerLink="/profile" class="menu-item" (click)="closeMenu()">Profile</a>
          <button class="menu-item logout-btn" (click)="logout(); closeMenu()">Logout</button>
        </div>

        <div *ngIf="menuOpen()" class="menu-overlay" (click)="closeMenu()"></div>
      </div>
    </div>
  </nav>
</header>
