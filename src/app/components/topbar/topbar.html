<header class="topbar">
  <nav class="topbar-inner" aria-label="Main navigation">
    <!-- BRAND -->
    <a class="brand-area" routerLink="/" aria-label="Scholo Learning Home">
      <img src="favicon.ico" class="app-logo" alt="Scholo Learning" />
      <span class="brand-text d-none d-sm-inline">Scholo</span>
    </a>

    <!-- SEARCH -->
    <div class="search-area d-none d-lg-flex" (click)="$event.stopPropagation()">
      <input
        type="text"
        class="search-input"
        placeholder="Search..."
        (focus)="ss.open.set(true)"
        (input)="onSearchInput($any($event.target).value)"
      />

      <button class="search-btn" type="button" (click)="ss.open.set(true)">
        <i class="bi bi-search"></i>
      </button>

      <ul *ngIf="ss.open() && ss.results().length" class="search-results">
        <li *ngFor="let item of ss.results()" (mousedown)="ss.navigate(item.route)">
          {{ item.label }}
        </li>
      </ul>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <!-- MOBILE SEARCH -->
      <button class="topbar-link d-lg-none" (click)="ss.open.set(true)">
        <i class="bi bi-search"></i>
      </button>

      <!-- STUDENT -->
      <ng-container *ngIf="profile()?.role === 'student'">
        <div class="learn-dropdown">
          <span class="topbar-link"> Learn <i class="bi bi-caret-down-fill small"></i> </span>

          <div class="learn-menu">
            <a routerLink="/report-card" class="menu-item">Report</a>
            <a routerLink="/student-creations" class="menu-item">Creations</a>
          </div>
        </div>
      </ng-container>

      <!-- TEACHER -->
      <ng-container *ngIf="profile()?.role === 'teacher'">
        <div class="learn-dropdown">
          <span class="topbar-link"> Studio <i class="bi bi-caret-down-fill small"></i> </span>

          <div class="learn-menu">
            <a routerLink="/schedule" class="menu-item">Schedule</a>
            <a routerLink="/chapter-browser" class="menu-item">Browse</a>
            <a routerLink="/teacher-workspace" class="menu-item">Dashboard</a>
          </div>
        </div>
      </ng-container>

      <!-- EXPLORE -->
      <div class="learn-dropdown d-none d-md-flex">
        <span class="topbar-link"> Explore <i class="bi bi-caret-down-fill small"></i> </span>

        <div class="learn-menu">
          <a routerLink="/about" class="menu-item">About</a>
          <a routerLink="/tuition-centers" class="menu-item">Centers</a>
          <a routerLink="/career" class="menu-item">Teach</a>
        </div>
      </div>

      <!-- MENTORS -->
      <a class="topbar-link d-none d-md-inline" routerLink="/teachers">Mentors</a>

      <!-- AUTH -->
      <ng-container *ngIf="!profile()">
        <a class="topbar-link fw-bold" routerLink="/login">Login</a>
      </ng-container>

      <!-- PROFILE -->
      <div class="profile-wrap" *ngIf="profile()">
        <!-- POINTS -->
        <div class="points-badge-wrap">
          <div class="points-badge">
            <i class="bi bi-lightning-fill"></i>
            <span class="val">{{ points() }}</span>
          </div>
          <div class="points-hint">Total points ⭐</div>
        </div>

        <!-- PROFILE MENU (HOVER ONLY) -->
        <div class="profile-menu-trigger">
          <img [src]="CommonUtil.getAvatarUrl(profile()?.avatarId || null)" class="profile-icon" />

          <div class="learn-menu">
            <a routerLink="/course-view/flutter-mobile-adv" class="menu-item">Profile</a>
            <button class="menu-item logout-btn" (click)="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>
