<header class="topbar">
  <nav class="topbar-inner" aria-label="Main navigation">
    <!-- BRAND -->
    <a class="brand-area" routerLink="/" aria-label="Free Tutor Home">
      <img
        src="favicon.ico"
        class="app-logo"
        alt="FreeTutor logo"
        width="32"
        height="33"
        decoding="async"
      />
      <span class="brand-text">FreeTutor</span>
    </a>

    <!-- SEARCH -->
    <div class="search-area d-none d-md-flex" (click)="$event.stopPropagation()">
      <label for="searchInput" class="visually-hidden">Search classes</label>

      <input
        #myInput
        id="searchInput"
        type="text"
        class="search-input"
        placeholder="Search classes, topics, exams..."
        (focus)="ss.open.set(true)"
        (input)="onSearchInput($any($event.target).value)"
      />

      <button class="search-btn" type="button" aria-label="Search" (click)="ss.open.set(true)">
        <i class="bi bi-search"></i>
      </button>

      <ul *ngIf="ss.open() && ss.results().length" class="search-results" role="listbox">
        <li *ngFor="let item of ss.results()" role="option" (mousedown)="ss.navigate(item.route)">
          {{ item.label }}
        </li>
      </ul>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <!-- NOT LOGGED -->
      <ng-container *ngIf="!profile()">
        <button class="login-btn" routerLink="/login">Log In</button>
        <button class="signup-btn" routerLink="/register">Sign Up</button>
      </ng-container>

      <!-- LOGGED -->
      <ng-container *ngIf="profile()">
        <a
          *ngIf="profile()?.role === 'teacher'"
          routerLink="/teacher-workspace"
          routerLinkActive="active"
          class="topbar-link"
        >
          Dashboard
        </a>

        <a
          *ngIf="profile()?.role === 'teacher'"
          routerLink="/chapter-browser"
          routerLinkActive="active"
          class="topbar-link"
        >
          Browse
        </a>

        <a
          *ngIf="profile()?.role === 'teacher'"
          routerLink="/schedule"
          routerLinkActive="active"
          class="topbar-link"
        >
          Schedule
        </a>

        <a class="topbar-link" routerLink="/teachers" routerLinkActive="active"> Teachers </a>

        <div class="learn-dropdown" (click)="$event.stopPropagation()">
          <span class="topbar-link" [class.active]="otherOpen()" (click)="toggleOther()">
            Other
            <i
              class="bi ms-1"
              [ngClass]="otherOpen() ? 'bi-chevron-up' : 'bi-chevron-down'"
              style="font-size: 10px"
            ></i>
          </span>

          <div class="learn-menu" *ngIf="otherOpen()">
            <a
              routerLink="/tuition-centers"
              routerLinkActive="active"
              class="menu-item"
              (click)="closeOther()"
            >
              Offline Centers
            </a>

            <a
              routerLink="/career"
              routerLinkActive="active"
              class="menu-item"
              (click)="closeOther()"
            >
              Careers
            </a>
          </div>
        </div>

        <div class="learn-dropdown" (click)="$event.stopPropagation()">
          <span class="topbar-link" [class.active]="learnOpen()" (click)="toggleLearn()">
            Learn
            <i
              class="bi ms-1"
              [ngClass]="learnOpen() ? 'bi-chevron-up' : 'bi-chevron-down'"
              style="font-size: 10px"
            ></i>
          </span>

          <div class="learn-menu" *ngIf="learnOpen()">
            <a
              routerLink="/report-card"
              routerLinkActive="active"
              class="menu-item"
              (click)="closeLearn()"
            >
              Report Card
            </a>

            <a
              routerLink="/student-creations"
              routerLinkActive="active"
              class="menu-item"
              (click)="closeLearn()"
            >
              Student Creations
            </a>
          </div>
        </div>

        <!-- PROFILE MENU -->
        <div class="profile-container">
          <i
            class="bi bi-person-circle profile-icon"
            (click)="toggleMenu(); $event.stopPropagation()"
          ></i>

          <div class="profile-menu" *ngIf="menuOpen()" role="menu">
            <a routerLink="/profile" class="menu-item" role="menuitem" (click)="closeMenu()">
              My Profile
            </a>

            <a routerLink="/about" class="menu-item" role="menuitem" (click)="closeMenu()">
              About
            </a>

            <button class="menu-item logout-btn" role="menuitem" (click)="logout(); closeMenu()">
              Logout
            </button>
          </div>

          <div
            *ngIf="menuOpen()"
            class="menu-overlay"
            (click)="closeMenu(); $event.stopPropagation()"
          ></div>
        </div>
      </ng-container>
    </div>
  </nav>
</header>
