<div class="mcq-game-card">

  <!-- ================= HEADER ================= -->
  <header class="mcq-header">

    <div class="mcq-title-wrap">
      <h3 class="mcq-title">Today’s Challenge</h3>
      <span class="mcq-level">Level {{ level() }}</span>
    </div>

    <div class="mcq-status" *ngIf="completed()">
      ✔ Completed
    </div>

  </header>


  <!-- ================= LOCKED AFTER COMPLETION ================= -->
  <div class="mcq-completed-view" *ngIf="completed()">

    <p class="completed-text">
      You’ve already solved this puzzle.  
      Come back tomorrow for a new challenge!
    </p>

    <div class="completed-answer">
      Correct Answer: <strong>{{ correctAnswerText() }}</strong>
    </div>

  </div>


  <!-- ================= ACTIVE GAME VIEW ================= -->
  <div class="mcq-body" *ngIf="!completed()">

    <!-- QUESTION -->
    <div class="mcq-question">
      {{ question() }}
    </div>


    <!-- OPTIONS -->
    <div class="mcq-options">

      <button
        class="mcq-option"
        *ngFor="let opt of options(); let i = index"
        [class.correct]="showResult() && i === correctIndex()"
        [class.wrong]="showResult() && i === selectedIndex() && i !== correctIndex()"
        [disabled]="showResult()"
        (click)="selectOption(i)"
      >
        <span class="option-label">
          {{ opt }}
        </span>
      </button>

    </div>


    <!-- INLINE RESULT FEEDBACK -->
    <div class="mcq-feedback" *ngIf="showResult()">

      <!-- CORRECT -->
      <div class="feedback-correct" *ngIf="isCorrect()">
        🎉 Correct! Well played.
      </div>

      <!-- WRONG -->
      <div class="feedback-wrong" *ngIf="!isCorrect()">
        ❌ Not quite. Think again next time!
      </div>

    </div>


    <!-- ACTION FOOTER -->
    <div class="mcq-footer" *ngIf="showResult()">

      <button
        class="next-btn"
        *ngIf="isCorrect()"
        (click)="finishPuzzle()"
      >
        Claim Completion
      </button>

      <button
        class="retry-btn"
        *ngIf="!isCorrect()"
        (click)="finishPuzzle()"
      >
        Continue
      </button>

    </div>

  </div>

</div>
