<section class="announce-wrap">
  <svg
    viewBox="0 0 800 260"
    class="announce-svg"
    preserveAspectRatio="xMidYMid meet"
  >

    <!-- MAIN PANEL -->
    <rect x="40" y="20" width="720" height="180"
      rx="4"
      fill="#3f95c9"
      stroke="#ff6a00"
      stroke-width="8"
    />

    <!-- POINTER -->
    <polygon points="370,200 430,200 400,240"
      fill="#ff6a00"
    />

    <!-- LEFT SECTION (40%) -->
    <g transform="translate(60,0)">

      <!-- divider -->
      <line x1="260" y1="40" x2="260" y2="180"
        stroke="#ffffff"
        stroke-opacity="0.25"
        stroke-width="2"
      />

      <!-- label -->
      <text x="130" y="100"
        text-anchor="middle"
        style="
          font-size: 20px;
          font-weight: 700;
          fill: #facc15;
          letter-spacing: 2px;
        ">
        LATEST
      </text>

      <text x="130" y="145"
        text-anchor="middle"
        style="
          font-size: 36px;
          font-weight: 800;
          fill: #ffffff;
        ">
        NEWS
      </text>

    </g>

    <!-- RIGHT SECTION (content dominant) -->

    <!-- SINGLE -->
    <foreignObject *ngIf="announcements().length === 1"
      x="320" y="80" width="400" height="100">
      <div xmlns="http://www.w3.org/1999/xhtml"
        style="
          display:flex;
          align-items:center;
          justify-content:center;
          text-align:left;
          font-size:20px;
          font-weight:600;
          color:#ffffff;
          line-height:1.4;
        ">
        {{ announcements()[0] }}
      </div>
    </foreignObject>

    <!-- DOUBLE -->
    <ng-container *ngIf="announcements().length === 2">

      <foreignObject x="320" y="70" width="400" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml"
          style="font-size:17px;color:#ffffff;">
          <b>1.</b> {{ announcements()[0] }}
        </div>
      </foreignObject>

      <foreignObject x="320" y="120" width="400" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml"
          style="font-size:17px;color:#ffffff;">
          <b>2.</b> {{ announcements()[1] }}
        </div>
      </foreignObject>

    </ng-container>

  </svg>
</section>
