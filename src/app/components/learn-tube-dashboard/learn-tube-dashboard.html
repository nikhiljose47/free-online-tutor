<section class="lt-shell">
  <div class="lt-frame d-flex align-items-center justify-content-center">
    @if (loading()) {
      <div class="w-100">
        <div class="skeleton-card"></div>
      </div>
    }

    @if (!loading()) {
      <div class="cards-wrap perspective-wrap w-100">
        <div class="row gx-3 gy-3 justify-content-center">
          <ng-container *ngFor="let item of items(); let i = index">
            <div class="col-12 col-md-4">
              <div class="card-holder w-100">
                <div
                  class="card-3d animate-book w-100"
                  [ngClass]="[
                    'delay-' + (i + 1),
                    selected === item.type ? 'active-card' : '',
                    isCompleted(item.type) ? 'completed-card' : '',
                  ]"
                  (click)="select(item.type, item.action)"
                >
                  <div class="glass-card">
                    <div class="face front">
                      <div class="title">{{ item.title }}</div>
                      <div class="sub">{{ item.sub }}</div>

                      @if (item.type === 'insight') {
                        <button class="redo-btn" (click)="$event.stopPropagation(); redoInsight()">
                          Do Again
                        </button>
                      }

                      @if (isCompleted(item.type)) {
                        <div class="status">
                          <i class="bi bi-check-circle-fill"></i>
                          <span>Completed</span>
                        </div>
                      }

                    </div>

                    <div class="face back"></div>
                  </div>
                </div>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    }
  </div>
</section>
