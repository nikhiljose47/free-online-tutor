<section class="tv-player">
  <div class="tv-frame">
    <div class="tv-display">
      @if (isLoading()) {
        <div class="tv-skeleton w-100 h-100 d-flex flex-column justify-content-end p-3">
          <div class="skeleton-line w-50 mb-2"></div>
          <div class="skeleton-line w-25"></div>
        </div>
      } @else if (hasError()) {
        <div
          class="tv-error d-flex flex-column align-items-center justify-content-center text-center w-100 h-100 px-3"
        >
          <div class="mb-2 small text-secondary">Stream unavailable</div>
          <button class="tv-btn" (click)="init()">Retry</button>
        </div>
      } @else {
        <div class="tv-content" [innerHTML]="safeContent()"></div>
      }
    </div>

    <!-- CONTROLS -->
    <div class="tv-controls d-flex justify-content-between align-items-center px-3">
      <div class="d-flex align-items-center gap-2">
        <!-- Play -->
        <button class="tv-btn" (click)="togglePlay()" [disabled]="isLoading()">
          <i class="bi" [ngClass]="isPlaying() ? 'bi-pause-fill' : 'bi-play-fill'"></i>
        </button>

        <!-- Volume (YouTube style) -->
        <div class="tv-volume d-flex align-items-center">
          <!-- Mute -->
          <button class="tv-btn" (click)="toggleMute()" [disabled]="isLoading()">
            <i
              class="bi"
              [ngClass]="service.isMuted() ? 'bi-volume-mute-fill' : 'bi-volume-up-fill'"
            >
            </i>
          </button>

          <!-- Slider (hidden until hover/focus via CSS) -->
          <input
            type="range"
            min="0"
            max="1"
            step="0.01"
            class="tv-volume-slider"
            [value]="service.volume()"
            (input)="setVolume($any($event.target).valueAsNumber)"
          />
        </div>
      </div>

      <div class="tv-time small">
        @if (!isLoading()) {
          {{ service.currentIndex() + 1 }}
        }
      </div>
    </div>
  </div>

  <!-- <div class="tv-meta">
    <h5 class="tv-title">
      @if (isLoading()) {
        <span class="skeleton-line w-40"></span>

  </div> -->
</section>
