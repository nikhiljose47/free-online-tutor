<section class="ph-wrap d-flex flex-column align-items-center justify-content-center text-center">
  <div class="ph-icon-wrap">
    <i class="bi" [class]="'bi ' + image"></i>
  </div>

  <h1 class="ph-title">Something went wrong</h1>

  <p class="ph-desc">
    {{ message || 'We’re trying to reconnect things. You can continue or go back safely.' }}
  </p>

  <div class="ph-actions d-flex gap-2 justify-content-center flex-wrap">
    <button class="ph-link-primary" (click)="goHome()">Go to Home</button>
    <button class="ph-link-secondary" (click)="retry()">Try again</button>
  </div>
</section>
