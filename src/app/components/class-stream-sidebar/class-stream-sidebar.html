<aside class="stream-sidebar" [class.collapsed]="collapsed()">
  <!-- COLLAPSE BUTTON (mobile only) -->
  <button class="collapse-btn" (click)="toggleSidebar()">
    <i class="bi" [ngClass]="collapsed() ? 'bi bi-arrow-bar-right' : 'bi bi-arrow-bar-left'"></i>
  </button>

  <!-- FULL MODE CONTENT -->
  <div class="full-content" *ngIf="!collapsed()">
    <!-- LIVE STREAMING -->
    <h6 class="section-title">Live Now</h6>

    <div class="live-item" *ngFor="let item of live()" (click)="open(item)">
      <img
        class="avatar-live"
        [src]="getBannerSrc(item.image)"
        [alt]="getBannerAlt(item.title)"
        loading="lazy"
        (error)="onImgError($event)"
      />
      <div class="info">
        <div class="title">{{ item.classId }}</div>
        <div class="sub-title">{{ item.subjectId }}</div>
      </div>
      <div class="status-box">
        <span class="red-dot"></span>
        <!-- <span class="viewer-count">{{ 10 }}</span> -->
      </div>
    </div>

    <div class="section-gap"></div>

    <!-- UPCOMING -->
    <h6 class="section-title mt-2">Upcoming</h6>

    <div class="live-item" *ngFor="let item of upcoming()" (click)="open(item)">
      <img
        class="avatar"
        [src]="getBannerSrc(item.image)"
        [alt]="getBannerAlt(item.title)"
        loading="lazy"
        (error)="onImgError($event)"
      />
      <div class="info">
        <div class="title">{{ item.className }}</div>
        <div class="sub-title">{{ item.subjectId }}</div>
        <div class="subject">{{ item.date.toDate() | date: 'EE, d MMM, h:mm aa' }}</div>
      </div>
      <div class="status-box upcoming-clock">
        <i class="bi bi-clock"></i>
      </div>
    </div>
  </div>

  <!-- COLLAPSED AVATAR-ONLY MODE -->
  <div class="collapsed-content" *ngIf="collapsed()">
    <img
      *ngFor="let item of live()"
      class="collapsed-avatar"
      [src]="getBannerSrc(item.image)"
      [alt]="getBannerAlt(item.title)"
      loading="lazy"
      (error)="onImgError($event)"
      (click)="open(item)"
    />

    <!-- UPCOMING -->
    <img
      *ngFor="let item of upcoming()"
      class="collapsed-avatar"
      [src]="getBannerSrc(item.image)"
      [alt]="getBannerAlt(item.title)"
      loading="lazy"
      (error)="onImgError($event)"
      (click)="open(item)"
    />
  </div>
</aside>
