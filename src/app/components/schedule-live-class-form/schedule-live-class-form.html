<div class="schedule-card">
  <div class="schedule-wrap py-4">
    <!-- HEADER -->
    <div class="mb-4">
      <h4 class="title mb-1">Schedule Live Session</h4>
      <p class="subtitle mb-0">Create a simple, focused meeting setup</p>
    </div>

    <!-- ================= GROUP ================= -->
    <div class="section mb-4">
      <div class="section-label">Group</div>

      <div class="row g-3">
        <div class="col-md-4">
          <select class="form-select" #groupSel (change)="updateField('group', groupSel.value)">
            <option value="">Select Group</option>
            <option *ngFor="let g of groupList()" [value]="g">{{ g }}</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ================= ACADEMIC ================= -->
    <div class="section mb-4">
      <div class="section-label">Academic</div>

      <div class="row g-3">
        <div class="col-md-4">
          <select class="form-select" #classSel (change)="updateField('classId', classSel.value)">
            <option value="">Class</option>
            <option *ngFor="let c of classList()" [value]="c">{{ c }}</option>
          </select>
        </div>

        <div class="col-md-4">
          <select
            class="form-select"
            #subjectSel
            (change)="updateField('subjectId', subjectSel.value)"
          >
            <option value="">Subject</option>
            <option *ngFor="let s of subjectList()" [value]="s.code">{{ s.name }}</option>
          </select>
        </div>
      </div>

      
      <div class="row g-3 pt-4">
        <div *ngIf="currentAndNext$ | async as data">
          <span class="badge text-bg-info mx-2">Current: {{ data[0] }}</span>
          <span class="badge text-bg-success mx-2">Next: {{ data[1] }}</span>
        </div>
        <div class="col-md-6">
          <select
            class="form-select"
            #chapterSel
            (change)="updateField('chapterCode', chapterSel.value)"
          >
            <option value="">Chapter</option>
            <option *ngFor="let ch of chapterList()" [value]="ch.code">
              {{ ch.code }} — {{ ch.name }}
            </option>
          </select>
        </div>

        <div class="col-md-5">
          <select
            class="form-select"
            #divisionSel
            (change)="updateField('divisionId', divisionSel.value)"
          >
            <option value="">Division</option>
            <option *ngFor="let ch of divisions()" [value]="ch.code">
              {{ ch.code }} — {{ ch.name }}
            </option>
          </select>
        </div>
      </div>
    </div>

    <!-- ================= SESSION ================= -->
    <div class="section mb-4">
      <div class="section-label">Session</div>

      <div class="row g-3">
        <div class="col-md-4">
          <select class="form-select" #batchSel (change)="updateField('batchId', batchSel.value)">
            <option value="">Batch</option>
            <option *ngFor="let b of batchList" [value]="b">{{ b }}</option>
          </select>
        </div>

        <div class="col-md-8">
          <input
            type="url"
            class="form-control"
            placeholder="Meeting link"
            #meetInput
            (input)="updateField('meetLink', meetInput.value)"
            [class.is-invalid]="meetInput.value && !isValidUrl(meetInput.value)"
          />
          <div class="invalid-feedback">Valid URL required</div>
        </div>

        <div class="col-md-5">
          <input
            type="date"
            class="form-control"
            #dateInput
            (change)="updateField('date', dateInput.value)"
          />
        </div>

        <div class="col-md-3">
          <input
            type="time"
            class="form-control"
            #timeInput
            (change)="updateField('time', timeInput.value)"
          />
        </div>
      </div>
    </div>

    <!-- ================= ACTION ================= -->
    <div class="pt-2">
      <button class="btn btn-primary px-4" [disabled]="submitting()" (click)="scheduleClass()">
        Create Session
      </button>
    </div>
  </div>
</div>
