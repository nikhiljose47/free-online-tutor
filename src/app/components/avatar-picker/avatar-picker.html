<div class="container-fluid p-0">
  <div class="mx-auto" style="max-width: 420px">

    <!-- HEADER -->
    <div class="mb-4">
      <h5 class="fw-semibold mb-1">Profile photo</h5>
      <div class="text-muted small">Pick a clean avatar</div>
    </div>

    <!-- PREVIEW -->
    <div class="d-flex flex-column align-items-center mb-4">
      <div class="position-relative mb-2">
        <img
          *ngIf="selectedAvatar()"
          [src]="getAvatarUrl(selectedAvatar()!)"
          width="104"
          height="104"
          class="rounded-circle border"
          style="object-fit:cover; background:#f5f7fa"
        />

        <div
          *ngIf="!selectedAvatar()"
          class="rounded-circle border d-flex align-items-center justify-content-center text-muted small"
          style="width:104px;height:104px;background:#f5f7fa"
        >
          Add
        </div>
      </div>

      <div class="fw-medium small text-dark">
        {{ profile()?.name || 'Student' }}
      </div>
    </div>

    <!-- GRID -->
    <div class="avatar-grid">
      <div
        *ngFor="let a of avatars"
        (click)="selectAvatar(a)"
        class="avatar-tile"
        [class.active]="selectedAvatar() === a"
      >
        <img [src]="getAvatarUrl(a)" />
      </div>
    </div>

    <!-- ACTION -->
    <div class="pt-4">
      <button
        class="btn w-100 btn-dark rounded-pill"
        [disabled]="!selectedAvatar()"
        (click)="saveProfile()"
      >
        Save changes
      </button>
    </div>

  </div>
</div>
