<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">

  <!-- Base -->
  <rect width="800" height="450" fill="#ffffff"/>

  <!-- Paint Sweep -->
  <g transform="translate(-900,0)">
    <animateTransform attributeName="transform"
                      type="translate"
                      from="-900 0"
                      to="0 0"
                      dur="2s"
                      fill="freeze"
                      calcMode="spline"
                      keySplines="0.4 0 0.2 1"/>

    <polygon fill="#ea580c"
      points="0,0 900,0 1000,225 900,450 0,450"/>
  </g>

  <!-- Final Fill -->
  <rect width="800" height="450" fill="#ea580c" opacity="0">
    <animate attributeName="opacity"
             from="0" to="1"
             begin="2s"
             dur="0.2s"
             fill="freeze"/>
  </rect>

  <!-- CONTENT -->
  <g opacity="0">
    <animate attributeName="opacity"
             from="0" to="1"
             begin="2.1s"
             dur="0.5s"
             fill="freeze"/>

    <!-- Circle -->
    <circle cx="400" cy="170" r="60"
            stroke="#ffffff"
            stroke-width="5"
            fill="none"/>

    <!-- PERFECTLY CENTERED CHECK -->
    <path d="M375 170 L395 195 L430 150"
          stroke="#ffffff"
          stroke-width="6"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-dasharray="140"
          stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset"
               from="140" to="0"
               dur="0.5s"
               begin="2.2s"
               fill="freeze"/>
    </path>

    <!-- TEXT + EMOJI -->
    <g transform="translate(400,300)">

      <!-- Text (slightly left for balance) -->
      <text x="-35" y="0"
            text-anchor="middle"
            fill="#fff7ed"
            font-size="34"
            font-weight="500"
            font-family="Arial">
        Completed
      </text>

      <!-- Emoji box (closer now) -->
      <g transform="translate(75,-14)">
        <rect x="-20" y="-20"
              width="40" height="40"
              rx="16" ry="16"
              fill="#ffffff"
              stroke="#ffffff"
              stroke-width="2"/>

        <text x="0" y="7"
              text-anchor="middle"
              font-size="22">
          🎉
        </text>
      </g>

    </g>

  </g>

</svg>