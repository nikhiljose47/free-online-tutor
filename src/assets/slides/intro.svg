<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3fdf6"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- CARDS -->
  <g transform="translate(100,90)">

    <g>
      <rect x="0" y="0" rx="12" width="80" height="40" fill="url(#cardGrad)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 120,0; 120,60; 0,60; 0,0"
        dur="4s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="100" y="0" rx="12" width="80" height="40" fill="url(#cardGrad)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,60; -100,60; -100,0; 0,0"
        dur="4s" begin="0.2s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="200" y="0" rx="12" width="80" height="40" fill="url(#cardGrad)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -200,60; -200,0; 0,0"
        dur="4s" begin="0.4s" repeatCount="indefinite"/>
    </g>

  </g>

  <!-- CENTER RING -->
  <g transform="translate(300,140)" filter="url(#softGlow)">

    <circle r="60"
      fill="none"
      stroke="#16a34a"
      stroke-width="2"
      stroke-dasharray="6 10"
      opacity="0.4">
      <animateTransform attributeName="transform"
        type="rotate"
        from="0" to="360"
        dur="14s"
        repeatCount="indefinite"/>
    </circle>

    <circle r="38"
      fill="none"
      stroke="#22c55e"
      stroke-width="3"
      stroke-linecap="round">
      <animate attributeName="stroke-dasharray"
        values="0 240; 120 120; 0 240"
        dur="3s"
        repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- TITLE (UNCHANGED data-key) -->
  <text x="300" y="230"
    fill="#14532d"
    font-size="22"
    text-anchor="middle"
    opacity="0"
    data-key="title">

    App
    <animate attributeName="opacity"
      from="0" to="1"
      dur="0.8s"
      begin="0.5s"
      fill="freeze"/>
  </text>

  <!-- DATE (UNCHANGED data-key) -->
  <text x="300" y="255"
    fill="#4b5563"
    font-size="13"
    text-anchor="middle"
    opacity="0"
    data-key="date">

    Date
    <animate attributeName="opacity"
      from="0" to="1"
      dur="0.8s"
      begin="0.8s"
      fill="freeze"/>
  </text>

</svg>