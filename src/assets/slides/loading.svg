<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg{fill:#0b0b0c}
    .txt{fill:#fff;font-size:18px;text-anchor:middle;opacity:0;animation:f 1s infinite alternate}
    @keyframes f{to{opacity:1}}
  </style>
  <rect class="bg" width="100%" height="100%"/>
  <text x="300" y="150" class="txt" data-key="heading">Loading</text>
</svg>