<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">

  <style>
    .bg { fill: #f9fafb; }

    .h {
      fill: #111827;
      font-size: 22px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
    }

    .d {
      fill: #374151;
      font-size: 15px;
      font-family: system-ui, sans-serif;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Heading -->
  <text x="40" y="50" class="h" data-key="heading"> </text>

  <!-- Description -->
  <text x="40" y="90" class="d" data-key="desc">
    <tspan x="40" dy="0"></tspan>
    <tspan x="40" dy="22"></tspan>
    <tspan x="40" dy="22"></tspan>
  </text>

</svg>