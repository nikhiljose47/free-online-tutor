<svg viewBox="0 0 600 320"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f9fafb"/>

  <!-- Caption -->
  <text x="300" y="40"
        fill="#111827"
        font-size="20"
        font-weight="600"
        text-anchor="middle"
        font-family="system-ui, sans-serif"
        data-key="caption"> </text>

  <!-- Frame -->
  <rect x="40" y="60" width="520" height="230" rx="14"
        fill="#ffffff"
        stroke="#e5e7eb"
        stroke-width="1.5"
        filter="url(#shadow)"/>

  <!-- Image -->
  <image x="50" y="70"
         width="500"
         height="210"
         preserveAspectRatio="xMidYMid meet"
         data-key="image"/>
</svg>