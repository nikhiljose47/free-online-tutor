<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <rect width="100%" height="100%" fill="#020617"/>

  <!-- GLOW -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="bigStar">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- STAR -->
  <g filter="url(#glow)">
    <circle cx="650" cy="80" r="55" fill="url(#bigStar)">
      <animate attributeName="r" values="55;65;55" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 🔥 4X PARTICLES -->
  <g fill="#38bdf8" opacity="0.6" filter="url(#glow)">

    <!-- ROW 1 -->
    <circle cx="60" cy="120" r="1.8"><animate attributeName="cy" values="120;90;120" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="200" r="2"><animate attributeName="cy" values="200;170;200" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="80" r="1.5"><animate attributeName="cy" values="80;50;80" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="160" r="2"><animate attributeName="cy" values="160;130;160" dur="6.5s" repeatCount="indefinite"/></circle>

    <!-- ROW 2 -->
    <circle cx="380" cy="220" r="1.8"><animate attributeName="cy" values="220;190;220" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="100" r="2"><animate attributeName="cy" values="100;70;100" dur="6.2s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="260" r="1.5"><animate attributeName="cy" values="260;220;260" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="180" r="2"><animate attributeName="cy" values="180;140;180" dur="6.8s" repeatCount="indefinite"/></circle>

    <!-- ROW 3 -->
    <circle cx="700" cy="300" r="2"><animate attributeName="cy" values="300;260;300" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="150" r="1.6"><animate attributeName="cy" values="150;120;150" dur="5.8s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="320" r="1.8"><animate attributeName="cy" values="320;280;320" dur="5.3s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="360" r="2"><animate attributeName="cy" values="360;320;360" dur="6.1s" repeatCount="indefinite"/></circle>

    <!-- ROW 4 -->
    <circle cx="260" cy="280" r="1.5"><animate attributeName="cy" values="280;240;280" dur="5.7s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="340" r="2"><animate attributeName="cy" values="340;300;340" dur="6.4s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="260" r="1.7"><animate attributeName="cy" values="260;220;260" dur="5.6s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="320" r="2"><animate attributeName="cy" values="320;280;320" dur="6.2s" repeatCount="indefinite"/></circle>

    <!-- EXTRA MICRO PARTICLES -->
    <circle cx="600" cy="340" r="1.2" opacity="0.4"><animate attributeName="cy" values="340;300;340" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="220" r="1.2" opacity="0.4"><animate attributeName="cy" values="220;190;220" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="280" r="1.2" opacity="0.4"><animate attributeName="cy" values="280;240;280" dur="7.2s" repeatCount="indefinite"/></circle>

  </g>

  <!-- TITLE -->
  <text x="80" y="80"
        text-anchor="start"
        fill="#e2e8f0"
        font-size="30"
        font-weight="600"
        opacity="0"
        data-key="title">
    Title
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- BULLETS -->
  <g transform="translate(80,150)" font-size="20" fill="#cbd5f5">

    <g data-key-group="point1" opacity="0">
      <circle cx="0" cy="-6" r="5" fill="#38bdf8"/>
      <text x="20" y="0" data-key="point1">Point 1</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
    </g>

    <g data-key-group="point2" transform="translate(0,50)" opacity="0">
      <circle cx="0" cy="-6" r="5" fill="#22c55e"/>
      <text x="20" y="0" data-key="point2">Point 2</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
    </g>

    <g data-key-group="point3" transform="translate(0,100)" opacity="0">
      <circle cx="0" cy="-6" r="5" fill="#f59e0b"/>
      <text x="20" y="0" data-key="point3">Point 3</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.4s" fill="freeze"/>
    </g>

    <g data-key-group="point4" transform="translate(0,150)" opacity="0">
      <circle cx="0" cy="-6" r="5" fill="#ef4444"/>
      <text x="20" y="0" data-key="point4">Point 4</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.2s" fill="freeze"/>
    </g>

  </g>

</svg>