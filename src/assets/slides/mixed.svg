<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg{fill:#0b0b0c}
    .name{fill:#fff;font-size:20px}
    .role{fill:#9ca3af;font-size:14px}
  </style>
  <rect class="bg" width="100%" height="100%"/>
  <image x="60" y="100" width="80" height="80" data-key="avatar"/>
  <text x="160" y="140" class="name" data-key="name">Name</text>
  <text x="160" y="170" class="role" data-key="role">Role</text>
</svg>